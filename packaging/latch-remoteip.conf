# Latch — real client IPs in Apache access logs (fail2ban, admin log viewer).
# Requires mod_remoteip (enabled by default on Fedora httpd).
#
# Without this, a local reverse proxy (pfSense HAProxy, nginx, Caddy, etc.) leaves
# REMOTE_ADDR as 127.0.0.1 / ::1 in latch-access.log while security.log already
# records the visitor via CF-Connecting-IP (see source/docs/SECURITY.md).

<IfModule remoteip_module>
    # On-host reverse proxies forwarding to Apache.
    RemoteIPInternalProxy 127.0.0.1 ::1

    # Cloudflare (and Latch Request::ip()) use this header when CF-Ray is present.
    RemoteIPHeader CF-Connecting-IP

    # If your proxy forwards X-Forwarded-For instead, comment the line above and use:
    # RemoteIPHeader X-Forwarded-For
</IfModule>