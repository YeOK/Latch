# /etc/fail2ban/filter.d/latch-login.conf
# Failed Latch sign-in attempts return HTTP 200; successful sign-in redirects (302).
# Apache combined log: %h %l %u %t "%r" %>s %b — do not hardcode "-" between fields.
[Definition]
failregex = ^<HOST> \S+ \S+ \[[^\]]+\] "POST /login(?:/2fa)? HTTP/\d\.\d" 200 \S+
ignoreregex = ^(?:127\.0\.0\.1|::1) \S+ \S+