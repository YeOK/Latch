# /etc/fail2ban/filter.d/latch-login.conf
# Latch login abuse — prefer security.log (real client IPs behind Cloudflare/proxies).
# JSON lines written by Latch when login_fail is logged (see source/docs/SECURITY.md).
#
# Alternate: point logpath at Apache access log and rely on the second failregex
# (needs mod_remoteip or direct client connections — see packaging/latch-remoteip.conf).
[Definition]

failregex = "event":"login_fail","ip":"<HOST>"
            ^<HOST> -.*"POST /login(?:/2fa)? HTTP/\d\.\d" 200 \S+

ignoreregex = "event":"login_fail","ip":"(?:127\.0\.0\.1|::1)"
            ^(?:127\.0\.0\.1|::1) -

# Apache combined log only (ignored when watching security.log):
datepattern = ^[^\[]*\[({DATE})
              {^LN-BEG}