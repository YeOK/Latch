# Latch — Apache vhost (RPM install)
# Adjust ServerName and TLS/proxy settings for your host.

<VirtualHost *:80>
    ServerName forum.example.com
    DocumentRoot /usr/share/latch/source/public

    <Directory /usr/share/latch/source/public>
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /usr/share/latch/source/storage>
        Require all denied
    </Directory>
    <Directory /usr/share/latch/source/config>
        Require all denied
    </Directory>
    <Directory /var/lib/latch/storage>
        Require all denied
    </Directory>
    <Directory /usr/share/latch/source/vendor>
        Require all denied
    </Directory>

    ErrorLog  /var/log/httpd/latch-error.log
    CustomLog /var/log/httpd/latch-access.log combined

    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php-fpm/www.sock|fcgi://localhost"
    </FilesMatch>
</VirtualHost>